name: Daily Smart Brief
on:
  repository_dispatch:
    types: [fc-timer-trigger]
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---------------------------------------------------------
      # Task 1: GitHub Tech Brief (Independent Retry)
      # ---------------------------------------------------------
      - name: Run GitHub Brief (Retry on Failure)
        if: github.event.client_payload.task_type == 'tech' || github.event.client_payload.task_type == 'all'
        uses: nick-fields/retry@v3
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          # 只运行 GitHub 任务
          command: python main.py --type github
      
      # ---------------------------------------------------------
      # Task 2: Grok Macro Brief (Independent Retry)
      # ---------------------------------------------------------
      - name: Run Grok Macro Brief (Retry on Failure)
        if: always() && (github.event.client_payload.task_type == 'macro' || github.event.client_payload.task_type == 'all' || github.event_name == 'workflow_dispatch')
        uses: nick-fields/retry@v3
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          # 只运行 Macro 任务
          command: python main.py --type macro